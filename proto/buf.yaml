version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    # spec §6 names services as ComplianceAdmin/ComplianceScreening/... without
    # the "Service" suffix — matches the naming of sibling -core repos
    # (agentic-core, invoice-core). Do not enforce buf's SERVICE_SUFFIX rule.
    - SERVICE_SUFFIX
    # v1 is the first and only package namespace in Fase 1; version suffix
    # lint is noise until we introduce v2 namespaces for breaking changes.
    - PACKAGE_VERSION_SUFFIX
    # Fase 1 reuses generic Ack / ScreenResult / MatchResolution across RPCs
    # intentionally — the domain treats these as canonical response shapes.
    # Per-RPC naming would be cosmetic and clutter the generated TS namespace.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
